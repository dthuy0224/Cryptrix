version: '3.8'

services:
  # ----------------------------------------------------------------------------
  # Database Service (Postgres)
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: cryptrix-postgres
    restart: always
    environment:
      POSTGRES_USER: cryptrix_admin
      POSTGRES_PASSWORD: cryptrix_secure_password_123
      POSTGRES_DB: cryptrix_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptrix_admin -d cryptrix_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Cache & Websocket Broker Service (Redis)
  # ----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cryptrix-redis
    restart: always
    command: redis-server --requirepass redis_secure_password_123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secure_password_123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # MLOps Server (MLflow Tracking)
  # ----------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    container_name: cryptrix-mlflow
    restart: always
    ports:
      - "5000:5000"
    environment:
      - BACKEND_STORE_URI=postgresql://cryptrix_admin:cryptrix_secure_password_123@postgres:5432/cryptrix_app
      - DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    command: >
      mlflow server 
      --backend-store-uri postgresql://cryptrix_admin:cryptrix_secure_password_123@postgres:5432/cryptrix_app
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    depends_on:
      postgres:
        condition: service_healthy

  # ----------------------------------------------------------------------------
  # FastAPI Application Backend Server
  # ----------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cryptrix-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://cryptrix_admin:cryptrix_secure_password_123@postgres:5432/cryptrix_app
      - REDIS_URL=redis://:redis_secure_password_123@redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis_secure_password_123
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ----------------------------------------------------------------------------
  # Next.js Application Frontend Dashboard
  # ----------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cryptrix-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/api/v1/market/ws
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  mlflow_artifacts:
    driver: local
