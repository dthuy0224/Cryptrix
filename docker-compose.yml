version: '3.8'

# ==============================================================================
# Cryptrix — Crypto AI Platform · Docker Compose
# ==============================================================================
# Services:
#   postgres    — Application & MLflow metadata database
#   redis       — Caching & session store
#   mlflow      — MLOps experiment tracking & model registry
#   api         — FastAPI prediction & market data server
#   dashboard   — Streamlit analytics dashboard
#
# Usage:
#   make up        — Start all services
#   make down      — Stop all services
#   make logs      — Tail logs
# ==============================================================================

services:

  # ----------------------------------------------------------------------------
  # PostgreSQL — Application & MLflow backend
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: cryptrix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cryptrix_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_env}
      POSTGRES_DB: ${POSTGRES_DB:-cryptrix_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cryptrix_admin} -d ${POSTGRES_DB:-cryptrix_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Redis — Cache & session store
  # ----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cryptrix-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_in_env}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_in_env}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # MLflow — Experiment tracking & model registry
  # ----------------------------------------------------------------------------
  mlflow:
    image: mlflow/mlflow:v2.13.0
    container_name: cryptrix-mlflow
    restart: unless-stopped
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    environment:
      - BACKEND_STORE_URI=postgresql://${POSTGRES_USER:-cryptrix_admin}:${POSTGRES_PASSWORD:-changeme_in_env}@postgres:5432/${POSTGRES_DB:-cryptrix_db}
      - DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-cryptrix_admin}:${POSTGRES_PASSWORD:-changeme_in_env}@postgres:5432/${POSTGRES_DB:-cryptrix_db}
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    depends_on:
      postgres:
        condition: service_healthy

  # ----------------------------------------------------------------------------
  # FastAPI — Prediction & market data API
  # Note: Uses service name 'api' (not localhost) for inter-container comms
  # ----------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: cryptrix-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-cryptrix_admin}:${POSTGRES_PASSWORD:-changeme_in_env}@postgres:5432/${POSTGRES_DB:-cryptrix_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme_in_env}@redis:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=${MLFLOW_EXPERIMENT_NAME:-cryptrix-market-forecasting}
    volumes:
      - ./data:/app/data           # Shared data directory
      - ./models:/app/models       # Shared model artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ----------------------------------------------------------------------------
  # Streamlit Dashboard — Analytics & visualization
  # ----------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: cryptrix-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    environment:
      - API_BASE_URL=http://api:8000/api/v1
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID:-}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET:-}
      - NEWS_API_KEY=${NEWS_API_KEY:-}
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  mlflow_artifacts:
    driver: local
